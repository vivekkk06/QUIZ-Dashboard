<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Quiz App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="quiz-container">
        <div id="start-screen" class="screen active">
            <h1>Knowledge Check</h1>
            <p>You will have 15 seconds to answer each question.</p>
            <button id="start-btn" class="btn">Start Quiz</button>
        </div>

        <div id="quiz-screen" class="screen">
            <div class="header">
                <span id="question-tracker">Question 1/4</span>
                <span class="timer-box">Time: <span id="time-left">15</span>s</span>
            </div>
            <h2 id="question-text">Question goes here</h2>
            <div id="options-container" class="options-grid">
                </div>
        </div>

        <div id="result-screen" class="screen">
            <h2>Quiz Completed!</h2>
            <p>Your final score is: <span id="final-score">0</span> out of <span id="total-questions">0</span></p>
            <button id="restart-btn" class="btn">Restart Quiz</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
