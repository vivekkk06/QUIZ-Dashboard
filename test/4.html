<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>question 4</title>
    <style>
        .parent {
            display: flex;
            justify-content: center;
            align-items: center;
            background: #6365ef;
            align-content: flex-start;
            height: 80vh;
            width: 80vh;
            
            .main-box{
                display: flexbox;
                background: #e436ca;
                position: absolute;
                width: 150px;
                height: 150px;
                align-content: flex-start;

            }
            .floating-box{
                display: flexbox;
                background: #ed5555;
                position: relative;
                width: 100px;
                height: 100px;

            }
        }
    </style>
</head>
<body>
    <div class="parent">
    <div class="main-box"></div>
    <div class="floating-box"></div>
</div>
</body>
</html>
