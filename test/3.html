<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>question 3</title>
    <style>
        .grid-container{
            header{
                display: flex;
                width: 100vh;
                background: #ed5555;
            }
            aside{
                display: grid;
                height: 100vh;
                width: 8vh;
                background: #555ce7;
            }
            main{
                display: inline;
                height: 100%;
                justify-content: center;
                background: #ade755;
            }
            footer{
                display: flex;
                width: 100vh;
                background: #ed5555;
            }
        }
    </style>
</head>
<body>
    <div class="grid-container">
    <header>Header</header>
    <aside>Sidebar</aside>
    <main>Main Content</main>
    <footer>Footer</footer>
</div>
</body>
</html>
